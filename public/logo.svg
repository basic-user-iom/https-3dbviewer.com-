<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 3D Cube - Front Face -->
  <path d="M12 20 L24 12 L36 20 L24 28 Z" fill="url(#gradient1)" opacity="0.9"/>
  
  <!-- 3D Cube - Top Face -->
  <path d="M24 12 L36 20 L36 32 L24 24 Z" fill="url(#gradient2)" opacity="0.7"/>
  
  <!-- 3D Cube - Right Face -->
  <path d="M36 20 L36 32 L24 28 L24 24 Z" fill="url(#gradient3)" opacity="0.8"/>
  
  <!-- Perspective lines for depth -->
  <path d="M24 12 L24 24" stroke="url(#gradient1)" stroke-width="1.5" opacity="0.5"/>
  <path d="M36 20 L36 32" stroke="url(#gradient2)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Eye/viewer symbol overlay -->
