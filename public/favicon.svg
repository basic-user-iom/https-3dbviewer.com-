<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="orb" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="8%" stop-color="#fff9d6"/>
      <stop offset="22%" stop-color="#facc15"/>
      <stop offset="38%" stop-color="#eab308"/>
      <stop offset="58%" stop-color="#ca8a04"/>
      <stop offset="78%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="14" fill="url(#highlight)"/>
</svg>