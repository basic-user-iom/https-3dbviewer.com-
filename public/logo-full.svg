<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fullGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fullGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fullGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 3D Cube Icon -->
  <g transform="translate(0, 0)">
    <!-- Front Face -->
    <path d="M12 20 L24 12 L36 20 L24 28 Z" fill="url(#fullGradient1)" opacity="0.9"/>
    <!-- Top Face -->
    <path d="M24 12 L36 20 L36 32 L24 24 Z" fill="url(#fullGradient2)" opacity="0.7"/>
    <!-- Right Face -->
    <path d="M36 20 L36 32 L24 28 L24 24 Z" fill="url(#fullGradient3)" opacity="0.8"/>
    <!-- Eye/viewer symbol -->
    <circle cx="24" cy="20" r="3" fill="white" opacity="0.9"/>
    <circle cx="24" cy="20" r="1.5" fill="url(#fullGradient1)"/>
  </g>
  
  <!-- Text -->
  <text x="52" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="url(#textGradient)">
    3D Model Viewer
  </text>
