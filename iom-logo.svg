  <path d="M136.31.14c60.11-3.26,107.32,49.56,95.21,109.09-13.88,68.21-99.3,95.12-151.11,49.45C18.8,104.37,54.79,4.57,136.31.14ZM134.88,33.65c-44.53,3.94-66.16,59.44-37.7,93.42,29.49,35.21,87.53,23.39,99.3-21.29,10.57-40.12-20.53-75.76-61.6-72.13Z" fill="url(#iomGradient)" filter="url(#waterBend)"/>
